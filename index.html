<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0e;
    --surface: #111114;
    --surface2: #18181d;
    --border: #22222a;
    --border2: #2e2e3a;
    --text: #e8e8f0;
    --text2: #8888a0;
    --text3: #55556a;
    --accent: #c8b88a;
    --accent2: #8a9cc8;
    --green: #7abf8a;
    --red: #bf7a7a;
    --amber: #c8a87a;
    --skate-orange: #e07838;
    --purple: #9a8abf;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── PASSWORD SCREEN ── */
  #lock-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    gap: 32px;
  }

  .lock-logo {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .lock-logo span {
    font-style: italic;
    color: var(--text3);
    font-size: 14px;
    display: block;
    text-align: center;
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  .lock-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }

  .lock-input {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 12px 20px;
    width: 240px;
    text-align: center;
    letter-spacing: 0.2em;
    outline: none;
    transition: border-color 0.2s;
  }

  .lock-input:focus { border-color: var(--accent); }
  .lock-input::placeholder { color: var(--text3); letter-spacing: 0.05em; }

  .lock-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    padding: 10px 32px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .lock-btn:hover { background: var(--accent); color: var(--bg); }

  .lock-error {
    color: var(--red);
    font-size: 11px;
    letter-spacing: 0.08em;
    min-height: 16px;
    text-align: center;
  }

  /* ── MAIN DASHBOARD ── */
  #dashboard {
    display: none;
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .header-left h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    color: var(--text);
    font-weight: 400;
    line-height: 1;
  }

  .header-left h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .header-date {
    color: var(--text3);
    font-size: 11px;
    letter-spacing: 0.1em;
    margin-top: 6px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .sync-info {
    color: var(--text3);
    font-size: 11px;
    letter-spacing: 0.05em;
    text-align: right;
  }

  .sync-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 16px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .panel-calendar::before { background: linear-gradient(90deg, var(--accent), transparent); }
  .panel-deps::before { background: linear-gradient(90deg, var(--accent2), transparent); }
  .panel-workflows::before { background: linear-gradient(90deg, var(--purple), transparent); }
  .panel-tasks::before { background: linear-gradient(90deg, var(--green), transparent); }

  .panel-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 16px;
  }

  /* ── CALENDAR PANEL ── */
  .panel-calendar { grid-column: 1 / 2; grid-row: 1 / 2; }

  .cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .cal-month {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
    color: var(--text);
    font-weight: 400;
  }

  .cal-nav {
    display: flex;
    gap: 8px;
  }

  .cal-nav button {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text3);
    width: 24px;
    height: 24px;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .cal-nav button:hover { border-color: var(--accent); color: var(--accent); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-day-label {
    text-align: center;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    padding: 4px 0;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--text2);
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
    border: 1px solid transparent;
    gap: 2px;
  }

  .cal-day:hover { background: var(--surface2); border-color: var(--border); }
  .cal-day.today { color: var(--accent); border-color: var(--accent); }
  .cal-day.other-month { color: var(--text3); }
  .cal-day.has-event::after {
    content: '';
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent2);
  }
  /* dep halo + event pip are built entirely in JS via makePip / makeDepHalo */

  /* ── CALENDAR LEGEND ── */
  .cal-legend {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 16px;
  }
  .cal-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.06em;
  }
  .legend-dot-event {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    flex-shrink: 0;
  }
  .legend-dot-dep {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--amber);
    opacity: 0.38;
    flex-shrink: 0;
  }

  /* ── DEPENDENCIES PANEL ── */
  .panel-deps { grid-column: 2 / 3; grid-row: 1 / 2; }

  .dep-item {
    display: flex;
    gap: 10px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
    border-left: 2px solid transparent;
    transition: background 0.15s;
  }

  .dep-item:last-child { border-bottom: none; }
  .dep-item:hover { background: var(--surface2); }
  .dep-item.resolved { opacity: 0.45; }

  .dep-check {
    width: 14px;
    height: 14px;
    border: 1px solid var(--border2);
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .dep-check:hover { border-color: var(--green); }

  .dep-item.resolved .dep-check {
    background: var(--green);
    border-color: var(--green);
  }

  .dep-item.resolved .dep-check::after {
    content: '✓';
    font-size: 9px;
    color: var(--bg);
  }

  .dep-body { flex: 1; min-width: 0; }

  .dep-title {
    font-size: 12px;
    color: var(--text);
    line-height: 1.3;
  }

  .dep-item.resolved .dep-title { text-decoration: line-through; color: var(--text3); }

  .dep-meta {
    display: flex;
    gap: 10px;
    margin-top: 3px;
  }

  .dep-parent {
    font-size: 10px;
    color: var(--text3);
  }

  .dep-date {
    font-size: 10px;
    color: var(--amber);
  }

  /* keep agenda tag styles for calendar overlay */
  .agenda-tag {
    display: inline-block;
    padding: 1px 6px;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1px solid;
    margin-top: 4px;
  }

  .tag-work { color: var(--accent2); border-color: var(--accent2); }
  .tag-personal { color: var(--purple); border-color: var(--purple); }
  .tag-skate { color: var(--skate-orange); border-color: var(--skate-orange); }
  .tag-deadline { color: var(--amber); border-color: var(--amber); }

  /* ── WORKFLOWS PANEL ── */
  .panel-workflows { grid-column: 3 / 4; grid-row: 1 / 3; }

  .workflow-item {
    margin-bottom: 20px;
  }

  .workflow-item:last-child { margin-bottom: 0; }

  .workflow-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }

  .workflow-name {
    font-size: 12px;
    color: var(--text);
  }

  .workflow-pct {
    font-size: 11px;
    color: var(--accent);
  }

  .workflow-bar-bg {
    height: 3px;
    background: var(--surface2);
    border: 1px solid var(--border);
    margin-bottom: 6px;
  }

  .workflow-bar-fill {
    height: 100%;
    transition: width 0.8s ease;
  }

  .workflow-status {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .status-badge {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 8px;
    border: 1px solid;
  }

  .status-active { color: var(--green); border-color: var(--green); }
  .status-blocked { color: var(--red); border-color: var(--red); }
  .status-review { color: var(--amber); border-color: var(--amber); }
  .status-planned { color: var(--text3); border-color: var(--text3); }

  .workflow-next {
    font-size: 10px;
    color: var(--text3);
    font-style: italic;
  }

  /* ── WORKFLOW GROUPS ── */
  .workflow-group { margin-bottom: 4px; }
  .workflow-group-named { margin-bottom: 16px; }
  .workflow-group-label {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
    margin-bottom: 10px;
  }
  .workflow-group-item {
    padding: 8px 10px;
    border-left: 2px solid var(--border);
    margin-bottom: 10px;
    border-radius: 0 4px 4px 0;
  }
  .workflow-group-item:last-child { margin-bottom: 0; }
  .workflow-group-item .workflow-item { margin-bottom: 0; }

  /* ── TASKS PANEL ── */
  .panel-tasks { grid-column: 1 / 3; grid-row: 2 / 3; }

  .tasks-filters {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn.active, .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .tasks-list { display: flex; flex-direction: column; gap: 2px; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 10px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 2px solid transparent;
  }

  .task-item:hover { background: var(--surface2); border-color: var(--border); }

  .task-check {
    width: 14px;
    height: 14px;
    border: 1px solid var(--border2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    cursor: pointer;
  }

  .task-item.done .task-check {
    background: var(--green);
    border-color: var(--green);
  }

  .task-item.done .task-check::after {
    content: '✓';
    font-size: 9px;
    color: var(--bg);
  }

  .task-item.done .task-title {
    text-decoration: line-through;
    color: var(--text3);
  }

  .task-body { flex: 1; min-width: 0; }

  .task-title {
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .task-meta {
    display: flex;
    gap: 10px;
    margin-top: 2px;
  }

  .task-project {
    font-size: 10px;
    color: var(--text3);
  }

  .task-due {
    font-size: 10px;
  }

  .due-today { color: var(--amber); }
  .due-overdue { color: var(--red); }
  .due-upcoming { color: var(--text3); }

  .priority-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .pri-high { background: var(--red); }
  .pri-med { background: var(--amber); }
  .pri-low { background: var(--text3); }

  .task-item.pri-high-item { border-left-color: var(--red); }
  .task-item.pri-med-item { border-left-color: var(--amber); }

  .task-item[draggable="true"] { cursor: grab; }
  .task-item[draggable="true"]:active { cursor: grabbing; }
  .task-item.dragging { opacity: 0.35; }
  .task-item.drag-over { border-top: 2px solid var(--accent) !important; }

  /* ── DIVIDER LABEL ── */
  .section-divider {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 8px 0 4px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  /* ── CAL HOVER TOOLTIP ── */
  #cal-tooltip {
    display: none;
    position: fixed;
    z-index: 600;
    background: var(--surface2);
    border: 1px solid var(--border2);
    padding: 8px 12px;
    font-size: 11px;
    color: var(--text);
    max-width: 230px;
    pointer-events: none;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    line-height: 1.5;
  }
  #cal-tooltip.visible { display: block; }
  .tip-row { display: flex; gap: 6px; align-items: center; padding: 2px 0; }
  .tip-dot  { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .tip-dep  { width: 6px; height: 6px; border-radius: 1px; transform: rotate(45deg); flex-shrink: 0; background: transparent; }
  .tip-time { color: var(--text3); min-width: 30px; flex-shrink: 0; font-size: 10px; }
  .tip-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tip-sub  { color: var(--text3); font-size: 10px; margin-left: auto; padding-left: 8px; flex-shrink: 0; }
  .tip-divider { border-top: 1px solid var(--border); margin: 4px 0; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border2); }

  /* ── DAY DETAIL PANEL — fills the calendar panel area on day click ── */
  #event-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(12,12,14,0.18); /* subtle veil — rest of dashboard stays readable */
    z-index: 500;
  }
  #event-overlay.open { display: block; }
  .overlay-box {
    /* bounds set dynamically in JS to match .panel-calendar rect */
    position: fixed;
    background: rgba(13,13,16,0.82); /* semi-transparent — calendar grid shows faintly behind */
    backdrop-filter: blur(1.5px);
    -webkit-backdrop-filter: blur(1.5px);
    border: 1px solid var(--border2);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 18px 20px;
    z-index: 501;
  }
  .overlay-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 2px;
  }
  .overlay-date-label {
    font-size: 15px;
    color: var(--accent);
    font-family: 'Instrument Serif', serif;
  }
  .overlay-input {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  .overlay-input:focus { border-color: var(--accent); }
  .overlay-row { display: flex; gap: 10px; }
  .overlay-row .overlay-input { flex: 1; }
  .overlay-select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 12px;
    width: 100%;
    outline: none;
  }
  .overlay-actions { display: flex; gap: 10px; margin-top: 4px; }
  .overlay-btn {
    flex: 1;
    padding: 9px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .overlay-btn.primary { background: var(--accent); color: #0c0c0e; border-color: var(--accent); }
  .overlay-btn.primary:hover { background: #d4c49a; }
  .overlay-btn.cancel { background: transparent; color: var(--text2); }
  .overlay-btn.cancel:hover { background: var(--surface2); }
  .overlay-status { font-size: 11px; color: var(--text2); text-align: center; min-height: 14px; }
  .overlay-status.ok { color: var(--green); }
  .overlay-status.err { color: var(--red); }
  /* GCal auth badge */
  #gcal-badge {
    font-size: 10px;
    color: var(--text3);
    text-align: right;
    padding: 4px 0 0;
  }
  #gcal-badge.authed { color: var(--green); }
  /* calendar day hover */
  .cal-day:not(.other-month) { cursor: pointer; }
  .cal-day:not(.other-month):hover { background: var(--surface2); border-radius: 4px; }

</style>
  <script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <div class="lock-logo">
    Command Centre
    <span>secured workspace</span>
  </div>
  <div class="lock-form">
    <input type="password" class="lock-input" id="pwd-input" placeholder="enter passphrase" autocomplete="off" />
    <button class="lock-btn" onclick="checkPassword()">unlock</button>
    <div class="lock-error" id="lock-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="header">
    <div class="header-left">
      <h1>Command <em>Centre</em></h1>
      <div class="header-date" id="header-date"></div>
    </div>
    <div class="header-right">
      <div class="sync-info">
        <div><span class="sync-dot"></span>live</div>
        <div id="last-sync">last sync: just now</div>
      </div>
    </div>
  </div>

  <div class="grid">

    <!-- CALENDAR -->
    <div class="panel panel-calendar">
      <div class="panel-label">Calendar</div>
      <div class="cal-header">
        <div class="cal-month" id="cal-month"></div>
        <div class="cal-nav">
          <button onclick="changeMonth(-1)">‹</button>
          <button onclick="changeMonth(1)">›</button>
        </div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>

      <div class="cal-legend">
        <span class="cal-legend-item"><span class="legend-dot-event"></span>Events</span>
        <span class="cal-legend-item"><span class="legend-dot-dep"></span>Dependencies</span>
      </div>
    </div>

    <!-- DEPENDENCIES -->
    <div class="panel panel-deps">
      <div class="panel-label">Dependencies</div>
      <div id="deps-list"></div>
    </div>

    <!-- WORKFLOWS -->
    <div class="panel panel-workflows">
      <div class="panel-label">Workflows</div>
      <div id="workflows-list"></div>
    </div>

    <!-- PENDING TASKS -->
    <div class="panel panel-tasks">
      <div class="panel-label">Pending Tasks</div>
      <div class="tasks-filters" id="tasks-filters">
        <button class="filter-btn active" onclick="filterTasks('all', this)">All</button>
        <button class="filter-btn" onclick="filterTasks('Jobseek', this)">Jobseek</button>
        <button class="filter-btn" onclick="filterTasks('Skate Haven Admin', this)">Skate Haven</button>
        <button class="filter-btn" onclick="filterTasks('Dashboard Setup', this)">Dashboard</button>
      </div>
      <div class="tasks-list" id="tasks-list"></div>
    </div>

  </div>
</div>

<script>
// ── PASSWORD ──
// Change this hash to set your password.
// Default password is: dashboard2024
// To change: use SHA-256 of your chosen password (e.g. via https://emn178.github.io/online-tools/sha256.html)
const PASSWORD_HASH = "1210ecc50496223fcff1b908380ea98c3cce9d428f7ce8d65f9f46cf66733876";

async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function checkPassword() {
  const val = document.getElementById('pwd-input').value;
  const hash = await sha256(val);
  if (hash === PASSWORD_HASH) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    init();
  } else {
    document.getElementById('lock-error').textContent = 'incorrect passphrase';
    document.getElementById('pwd-input').value = '';
    setTimeout(() => document.getElementById('lock-error').textContent = '', 2000);
  }
}

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

// ── LIVE DATA ──
let data = { checkpoints: [], events: [], dependencies: [], workflows: [], tasks: [] };

// ── Group colour palette ─────────────────────────────────────────────────────
const GROUP_COLORS = {
  'Grants': {
    color:   '#7aba8a',
    bg:      'rgba(122,186,138,0.09)',
    border:  'rgba(122,186,138,0.35)',
    keys:    ['grants','grant writing','grant writing freelance','track 0','voctech','rosa fund','city bridge','blume','bid writing']
  },
  'Jobseek': {
    color:   '#6a9cd8',
    bg:      'rgba(106,156,216,0.09)',
    border:  'rgba(106,156,216,0.35)',
    keys:    ['jobseek','assessor','meal','evaluation','sprint','track 2','track 4','freelance','linkedin','high trees']
  },
  'Skate Haven Admin': {
    color:   '#e07838',
    bg:      'rgba(224,120,56,0.09)',
    border:  'rgba(224,120,56,0.35)',
    keys:    ['skate','haven','cic','easter camp','hanwen','safeguarding','companies house','tom','canada water']
  },
  'Dashboard Setup': {
    color:   '#a07abf',
    bg:      'rgba(160,122,191,0.09)',
    border:  'rgba(160,122,191,0.35)',
    keys:    ['dashboard','plash','github','config']
  }
};

function getGroupStyle(name) {
  if (!name) return null;
  const lower = name.toLowerCase();
  for (const [group, s] of Object.entries(GROUP_COLORS)) {
    if (lower.includes(group.toLowerCase()) || s.keys.some(k => lower.includes(k)))
      return { group, ...s };
  }
  return null;
}

function groupStyleForWorkflowGroup(groupName) {
  return GROUP_COLORS[groupName] || null;
}

// Resolve the best colour for a dependency — infers from parentTitle first,
// then falls back to the stored workflowColor from the JSON.
function getDepColor(dep) {
  const gs = getGroupStyle(dep.parentTitle) || getGroupStyle(dep.title);
  if (gs) return gs.color;
  return dep.workflowColor || '#c8a87a';
}

// Map a calendar event to its display colour.
function getEventCalColor(ev) {
  if (ev.tag === 'skate')    return 'var(--skate-orange)';
  if (ev.tag === 'personal') return 'var(--purple)';
  if (ev.tag === 'deadline') return 'var(--amber)';
  return 'var(--accent2)';
}

// Build a pill indicator for calendar cells.
// colors: array of CSS colour strings (one per segment, max 4).
// opts: { bottom, segSize } — bottom px offset from cell edge, segSize = width & height of one segment.
function makePip(colors, opts) {
  const seg = opts.segSize || 4;
  const el  = document.createElement('div');
  el.style.cssText =
    `position:absolute;bottom:${opts.bottom}px;left:50%;transform:translateX(-50%);` +
    `display:flex;width:${seg * colors.length}px;height:${seg}px;` +
    `border-radius:${seg / 2}px;overflow:hidden;pointer-events:none;`;
  colors.forEach(c => {
    const s = document.createElement('div');
    s.style.cssText = `flex:1;background:${c};`;
    el.appendChild(s);
  });
  return el;
}

// Build a semi-transparent dep halo — same pill mechanic but softer.
// Rendered behind the event pip so the event dot floats on top.
function makeDepHalo(colors, opts) {
  const seg = opts.segSize || 10;
  const el  = document.createElement('div');
  el.style.cssText =
    `position:absolute;bottom:${opts.bottom}px;left:50%;transform:translateX(-50%);` +
    `display:flex;width:${seg * colors.length}px;height:${seg}px;` +
    `border-radius:${seg / 2}px;overflow:hidden;pointer-events:none;opacity:0.38;`;
  if (opts.title) el.title = opts.title;
  colors.forEach(c => {
    const s = document.createElement('div');
    s.style.cssText = `flex:1;background:${c};`;
    el.appendChild(s);
  });
  return el;
}

async function loadDashboardData() {
  try {
    const resp = await fetch('dashboard-data.json?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    data = await resp.json();
  } catch (e) {
    console.warn('dashboard-data.json not loaded:', e);
  }
}

let currentFilter = 'all';
let calDate = new Date();

async function init() {
  await loadDashboardData();
  applyPersistedState();
  initGcalAuth();
  renderHeader();
  renderCalendar();
  renderDependencies();
  renderWorkflows();
  renderTasks();
  // Retry any GCal writes that failed in a previous session
  // (token may not be ready yet — processRetryQueue checks internally)
  setTimeout(() => processRetryQueue(), 3000);
}

function renderHeader() {
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('header-date').textContent =
    `${days[now.getDay()]} · ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}

function renderCalendar() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month').textContent = `${months[calDate.getMonth()]} ${calDate.getFullYear()}`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Day labels
  ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-label';
    el.textContent = d;
    grid.appendChild(el);
  });

  const first = new Date(calDate.getFullYear(), calDate.getMonth(), 1);
  const last = new Date(calDate.getFullYear(), calDate.getMonth() + 1, 0);
  const today = new Date();

  // Build dependency map for displayed month: day → [{id, title, parentTitle, workflowColor}]
  const resolvedDeps = getResolvedDeps();
  const depMap = {};
  (data.dependencies || []).forEach(dep => {
    if (dep.resolved || resolvedDeps.has(dep.id)) return;
    if (!dep.resolveBy) return;
    const depDate = new Date(dep.resolveBy + 'T00:00:00');
    if (depDate.getFullYear() === calDate.getFullYear() && depDate.getMonth() === calDate.getMonth()) {
      const day = depDate.getDate();
      if (!depMap[day]) depMap[day] = [];
      depMap[day].push({ id: dep.id, title: dep.title, parentTitle: dep.parentTitle, workflowColor: dep.workflowColor || '#c8a87a' });
    }
  });

  let startDay = first.getDay() === 0 ? 6 : first.getDay() - 1;

  // Prev month padding
  const prevLast = new Date(calDate.getFullYear(), calDate.getMonth(), 0).getDate();
  for (let i = startDay - 1; i >= 0; i--) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = prevLast - i;
    grid.appendChild(el);
  }

  // Current month
  for (let d = 1; d <= last.getDate(); d++) {
    const el = document.createElement('div');
    let cls = 'cal-day';
    if (d === today.getDate() && calDate.getMonth() === today.getMonth() && calDate.getFullYear() === today.getFullYear()) cls += ' today';
    // position:relative needed for dependency diamond + event dot
    if (depMap[d]) cls += ' has-dep';
    el.className = cls;
    el.textContent = d;
    // Build date string for this cell
    const cellDate = new Date(calDate.getFullYear(), calDate.getMonth(), d);
    el.onclick = () => openOverlay(cellDate);
    // Dependency halo — semi-transparent filled pill, rendered behind event dots
    if (depMap[d]) {
      el.style.position = 'relative';
      const deps   = depMap[d].slice(0, 4);
      const colors = deps.map(dep => getDepColor(dep));
      const title  = deps.map(dep => `${dep.title} · ${dep.parentTitle}`).join('\n');
      el.appendChild(makeDepHalo(colors, { bottom: 0, segSize: 10, title }));
    }

    // Event pip — pill with up to 4 colour segments (one per event, capped at 4)
    // Centred inside the dep halo (bottom: 3px aligns both centre-lines at 5px up)
    const agendaDay = (data.events || data.agenda || []).filter(ev => {
      if (!ev._date) return false;
      const ed = new Date(ev._date);
      return ed.getFullYear() === cellDate.getFullYear() &&
             ed.getMonth()    === cellDate.getMonth() &&
             ed.getDate()     === cellDate.getDate();
    });
    if (agendaDay.length) {
      el.style.position = 'relative';
      const evs    = agendaDay.slice(0, 4);
      const colors = evs.map(getEventCalColor);
      el.appendChild(makePip(colors, { bottom: 3, segSize: 4 }));
    }

    // Hover tooltip — show brief event + dep info on mouseover
    const cellDeps = depMap[d] || [];
    if (agendaDay.length || cellDeps.length) {
      const tipHtml = buildCalTooltip(agendaDay, cellDeps);
      el.addEventListener('mouseenter', e => showCalTooltip(e, tipHtml));
      el.addEventListener('mousemove',  moveCalTooltip);
      el.addEventListener('mouseleave', hideCalTooltip);
    }

    grid.appendChild(el);
  }

  // Next month padding
  const totalCells = grid.children.length - 7;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let d = 1; d <= remaining; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = d;
    grid.appendChild(el);
  }
}

function changeMonth(dir) {
  calDate = new Date(calDate.getFullYear(), calDate.getMonth() + dir, 1);
  renderCalendar();
}

// ── Persistence helpers (localStorage) ──────────────────────────────────────


function getRemovedEvents() {
  try { return new Set(JSON.parse(localStorage.getItem('removedEvents') || '[]')); }
  catch { return new Set(); }
}

function getDoneTaskKeys() {
  try { return new Set(JSON.parse(localStorage.getItem('doneTasks') || '[]')); }
  catch { return new Set(); }
}

function getResolvedDeps() {
  try { return new Set(JSON.parse(localStorage.getItem('resolvedDeps') || '[]')); }
  catch { return new Set(); }
}

function getTaskOrder() {
  try { return JSON.parse(localStorage.getItem('taskOrder') || 'null'); }
  catch { return null; }
}

function setTaskOrder(ids) {
  localStorage.setItem('taskOrder', JSON.stringify(ids));
}

function taskKey(t) { return `${t.title}|||${t.project}`; }

// Apply persisted state onto freshly-loaded data
function applyPersistedState() {
  const removed  = getRemovedEvents();
  const doneKeys = getDoneTaskKeys();
  const resolved = getResolvedDeps();
  data.events = (data.events || data.agenda || []).filter(e => {
    const k = `${(e._date||'').slice(0,10)}|||${e.title}`;
    return !removed.has(k);
  });
  (data.tasks || []).forEach(t => {
    if (doneKeys.has(taskKey(t))) t.done = true;
  });
  // Apply resolved state to dependencies
  (data.dependencies || []).forEach(d => {
    if (resolved.has(d.id)) d.resolved = true;
  });
  // Apply custom task order from localStorage
  const order = getTaskOrder();
  if (order && order.length) {
    const taskMap = {};
    (data.tasks || []).forEach(t => { taskMap[t.id] = t; });
    const reordered = order.map(id => taskMap[id]).filter(Boolean);
    const rest = (data.tasks || []).filter(t => !order.includes(t.id));
    data.tasks = [...reordered, ...rest];
  }
}

function formatDepDate(dateStr) {
  try {
    const d = new Date(dateStr + 'T00:00:00');
    const today = new Date(); today.setHours(0,0,0,0);
    const delta = Math.round((d - today) / 86400000);
    if (delta < 0) return 'overdue';
    if (delta === 0) return 'today';
    if (delta === 1) return 'tomorrow';
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  } catch { return dateStr; }
}

function renderDependencies() {
  const list = document.getElementById('deps-list');
  if (!list) return;
  const resolved = getResolvedDeps();
  const deps = (data.dependencies || []);
  const unresolved = deps
    .filter(d => !d.resolved && !resolved.has(d.id))
    .sort((a, b) => (a.resolveBy || '').localeCompare(b.resolveBy || ''));
  const resolvedList = deps.filter(d => d.resolved || resolved.has(d.id));

  if (unresolved.length === 0 && resolvedList.length === 0) {
    list.innerHTML = '<div style="color:var(--text3);padding:14px 0;font-size:0.85rem;text-align:center;">No dependencies</div>';
    return;
  }

  const renderDep = (dep, isResolved) => {
    const color = getDepColor(dep);
    const dateLabel = dep.resolveBy ? formatDepDate(dep.resolveBy) : '—';
    const dateStyle = dateLabel === 'overdue' ? 'color:var(--red)' :
                      dateLabel === 'today'   ? 'color:var(--amber)' : 'color:var(--text3)';
    return `
      <div class="dep-item${isResolved ? ' resolved' : ''}" style="border-left-color:${color}">
        <div class="dep-check" onclick="toggleDep('${dep.id}')"></div>
        <div class="dep-body">
          <div class="dep-title">${dep.title}</div>
          <div class="dep-meta">
            <span class="dep-parent">→ ${dep.parentTitle || '—'}</span>
            <span class="dep-date" style="${dateStyle}">${dateLabel}</span>
          </div>
        </div>
      </div>`;
  };

  list.innerHTML = unresolved.map(d => renderDep(d, false)).join('') +
    (resolvedList.length
      ? `<div class="section-divider">Resolved</div>` + resolvedList.map(d => renderDep(d, true)).join('')
      : '');
}

function toggleDep(id) {
  const dep = (data.dependencies || []).find(d => d.id === id);
  const resolved = getResolvedDeps();
  const wasResolved = resolved.has(id) || (dep && dep.resolved);
  if (wasResolved) {
    resolved.delete(id);
    if (dep) dep.resolved = false;
  } else {
    resolved.add(id);
    if (dep) dep.resolved = true;
    // Action 4 — write audit note to parent GCal event (non-blocking)
    if (dep && dep.parentType !== 'workflow') {
      updateParentGcalEvent(dep).catch(() => {});
    }
  }
  localStorage.setItem('resolvedDeps', JSON.stringify([...resolved]));
  renderDependencies();
  renderCalendar();
}

function renderWorkflows() {
  const list = document.getElementById('workflows-list');
  const colors = { active: '#7abf8a', blocked: '#bf7a7a', review: '#c8a87a', planned: '#55556a' };

  const renderWf = wf => `
    <div class="workflow-item">
      <div class="workflow-header">
        <div class="workflow-name">${wf.name}</div>
        <div class="workflow-pct">${wf.pct}%</div>
      </div>
      <div class="workflow-bar-bg">
        <div class="workflow-bar-fill" style="width:${wf.pct}%;background:${colors[wf.status]}"></div>
      </div>
      <div class="workflow-status">
        <span class="status-badge status-${wf.status}">${wf.status}</span>
        <span class="workflow-next">${wf.next}</span>
      </div>
    </div>`;

  // Group workflows; preserve insertion order of groups
  const groupOrder = [];
  const groups = {};
  (data.workflows || []).forEach(wf => {
    const g = wf.group || '—';
    if (!groups[g]) { groups[g] = []; groupOrder.push(g); }
    groups[g].push(wf);
  });

  list.innerHTML = groupOrder.map(g => {
    const isUngrouped = g === '—';
    const gs = isUngrouped ? null : groupStyleForWorkflowGroup(g);
    const labelStyle = gs ? `color:${gs.color};border-bottom-color:${gs.border};` : '';
    const itemStyle  = gs ? `border-left-color:${gs.border};background:${gs.bg};` : '';
    const header = isUngrouped ? '' : `<div class="workflow-group-label" style="${labelStyle}">${g}</div>`;
    const items = groups[g].map(wf =>
      `<div class="workflow-group-item" style="${itemStyle}">${renderWf(wf)}</div>`
    ).join('');
    return `<div class="workflow-group ${isUngrouped ? '' : 'workflow-group-named'}">${header}<div class="workflow-group-items">${items}</div></div>`;
  }).join('');
}

const PRIORITY_ORDER = { high: 0, med: 1, low: 2 };

function renderTasks() {
  const list = document.getElementById('tasks-list');
  let tasks = [...(data.tasks || [])];

  // Filter by workflow group
  if (currentFilter !== 'all') {
    tasks = tasks.filter(t => {
      const gs = getGroupStyle(t.project);
      return gs && gs.group === currentFilter;
    });
  }

  let pending = tasks.filter(t => !t.done);
  const done = tasks.filter(t => t.done);

  // Sort by priority only if no custom order has been set
  const order = getTaskOrder();
  if (!order) {
    pending.sort((a, b) => (PRIORITY_ORDER[a.priority] ?? 1) - (PRIORITY_ORDER[b.priority] ?? 1));
  }

  const renderItem = t => {
    const gs = getGroupStyle(t.project);
    const bgStyle = gs && !t.done ? `background:${gs.bg};` : '';
    const borderColor = gs && !t.done ? gs.color : 'transparent';
    return `
    <div class="task-item ${t.done ? 'done' : ''}"
         style="${bgStyle}border-left:2px solid ${borderColor};"
         data-id="${t.id}"
         draggable="${!t.done}"
         onclick="toggleTask(${t.id})">
      <div class="task-check"></div>
      <div class="task-body">
        <div class="task-title">${t.title}</div>
        <div class="task-meta">
          <span class="task-project" style="${gs ? `color:${gs.color};` : ''}">${t.project}</span>
        </div>
      </div>
      <div class="priority-dot pri-${t.priority}"></div>
    </div>`;
  };

  list.innerHTML = pending.map(renderItem).join('') +
    (done.length ? `<div class="section-divider">Completed</div>` + done.map(renderItem).join('') : '');

  initTaskDrag();
}

function toggleTask(id) {
  const task = data.tasks.find(t => t.id === id);
  if (!task) return;
  task.done = !task.done;
  const doneKeys = getDoneTaskKeys();
  if (task.done) doneKeys.add(taskKey(task));
  else           doneKeys.delete(taskKey(task));
  localStorage.setItem('doneTasks', JSON.stringify([...doneKeys]));
  renderTasks();
}

function filterTasks(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTasks();
}

// ── DRAG TO REORDER ──────────────────────────────────────────────────────────
let dragSrcId = null;

function initTaskDrag() {
  document.querySelectorAll('.task-item[draggable="true"]').forEach(item => {
    item.addEventListener('dragstart', onDragStart);
    item.addEventListener('dragover',  onDragOver);
    item.addEventListener('dragleave', onDragLeave);
    item.addEventListener('drop',      onDrop);
    item.addEventListener('dragend',   onDragEnd);
  });
}

function onDragStart(e) {
  dragSrcId = parseInt(this.dataset.id);
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  // prevent onclick firing after drag
  this.addEventListener('click', e => e.stopPropagation(), { once: true });
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.task-item').forEach(el => el.classList.remove('drag-over'));
  this.classList.add('drag-over');
}

function onDragLeave() {
  this.classList.remove('drag-over');
}

function onDrop(e) {
  e.stopPropagation();
  const targetId = parseInt(this.dataset.id);
  if (!dragSrcId || dragSrcId === targetId) return;
  const tasks = data.tasks;
  const srcIdx = tasks.findIndex(t => t.id === dragSrcId);
  const tgtIdx = tasks.findIndex(t => t.id === targetId);
  if (srcIdx === -1 || tgtIdx === -1) return;
  const [moved] = tasks.splice(srcIdx, 1);
  tasks.splice(tgtIdx, 0, moved);
  setTaskOrder(tasks.map(t => t.id));
  renderTasks();
}

function onDragEnd() {
  dragSrcId = null;
  document.querySelectorAll('.task-item').forEach(el => {
    el.classList.remove('dragging', 'drag-over');
  });
}

// ── Local calendar bridge (writes to Apple Calendar → iCloud) ────────────────
// When served from localhost:7891 the bridge is same-origin (no CORS/mixed-content).
// Falls back to LAN IP so other devices on the same WiFi also work.
const CAL_SERVER_URLS = ['http://localhost:7891', 'http://192.168.1.108:7891'];
let _calServerUrl = null;

async function getCalServerUrl() {
  if (_calServerUrl) return _calServerUrl;
  // If the page is already served by the local server, use its own origin
  if (window.location.hostname === 'localhost' || window.location.hostname === '192.168.1.108') {
    _calServerUrl = window.location.origin;
    return _calServerUrl;
  }
  // Otherwise probe (works if browser allows HTTP fetch from HTTPS — unlikely)
  for (const url of CAL_SERVER_URLS) {
    try {
      const r = await fetch(`${url}/ping`, { signal: AbortSignal.timeout(1500) });
      if (r.ok) { _calServerUrl = url; return url; }
    } catch {}
  }
  return null;
}

async function calServerPost(path, body) {
  const url = await getCalServerUrl();
  if (!url) throw new Error('Calendar bridge not reachable — open http://localhost:7891');
  const r = await fetch(`${url}${path}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return r.json();
}

async function calServerDelete(path, body) {
  const url = await getCalServerUrl();
  if (!url) throw new Error('Calendar bridge not reachable — open http://localhost:7891');
  const r = await fetch(`${url}${path}`, {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return r.json();
}

function initGcalAuth() {
  if (!GCAL_CLIENT_ID || GCAL_CLIENT_ID === 'YOUR_CLIENT_ID') return;
  try {
    const client = google.accounts.oauth2.initTokenClient({
      client_id: GCAL_CLIENT_ID,
      scope: GCAL_SCOPES,
      callback: (resp) => {
        if (resp.access_token) {
          gcalToken = resp.access_token;
          document.getElementById('gcal-badge').textContent = '● connected to GCal';
          document.getElementById('gcal-badge').classList.add('authed');
        }
        // Unblock any pending token-refresh awaits in gcalReq()
        if (window._gcalTokenResolve) {
          window._gcalTokenResolve(!!gcalToken);
          delete window._gcalTokenResolve;
        }
      }
    });
    // Request token silently on load (uses cached consent if available)
    client.requestAccessToken({ prompt: '' });
    window._gcalClient = client;
  } catch(e) { /* GIS not loaded yet */ }
}

let overlayDate = null;

function openOverlay(date) {
  overlayDate = date;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  const dayEvts  = (data.events || []).filter(e => e._date && e._date.slice(0,10) === dateStr);
  const evList   = document.getElementById('overlay-events-list');
  // Surface dependencies for this day (by resolveBy date)
  const dayDepsResolved = getResolvedDeps();

    if (!dep.resolveBy) return false;
    if (dep.resolved || dayDepsResolved.has(dep.id)) return false;
    const dd = new Date(dep.resolveBy + 'T00:00:00');
    return dd.getFullYear() === date.getFullYear() && dd.getMonth() === date.getMonth() && dd.getDate() === date.getDate();
  });
  const depHtml = dayDeps.map(dep => {
    const col = getDepColor(dep);

      <div style="width:8px;height:8px;transform:rotate(45deg);border:1.5px solid ${col};flex-shrink:0;border-radius:1px;"></div>
      <div style="flex:1;">

        <div style="font-size:0.9rem;color:var(--text);font-weight:500;">${dep.title}</div>

  if (dayEvts.length === 0 && dayDeps.length === 0) {
    evList.innerHTML = '<div style="color:var(--text3);padding:8px 0;font-size:0.85rem;text-align:center;">Nothing scheduled</div>';
  } else {
    const evHtml = dayEvts.map(e => `
      <div style="display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border);">
        <div style="font-size:0.8rem;color:var(--text3);min-width:38px;padding-top:2px;">${e.time}</div>
        <div style="flex:1;">
          <div style="font-size:0.9rem;color:var(--text);font-weight:500;">${e.title}</div>
          <div style="font-size:0.75rem;color:var(--text3);">${e.calendar || ''}</div>
        </div>
        <div style="display:flex;gap:4px;align-items:flex-start;flex-shrink:0;margin-top:1px;">
          <span class="agenda-tag tag-${e.tag}">${e.tag}</span>
          <button onclick="showEditForm('${dateStr}','${e.title.replace(/'/g,"\\'")}','${e.time}','${e.tag}')" title="Edit event"
            style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--text3);cursor:pointer;font-size:11px;padding:2px 6px;line-height:1;"
            onmouseover="this.style.borderColor='var(--accent2)';this.style.color='var(--accent2)'"
            onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text3)'">✎</button>
          <button onclick="showDeleteConfirm('${dateStr}','${e.title.replace(/'/g,"\\'")}',this)" title="Delete from GCal"
            style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--text3);cursor:pointer;font-size:11px;padding:2px 6px;line-height:1;"
            onmouseover="this.style.borderColor='var(--red)';this.style.color='var(--red)'"
            onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text3)'">✕</button>
        </div>
      </div>`).join('');
    evList.innerHTML = depHtml + evHtml;
  }

  // Always open to day view
  document.getElementById('overlay-day-view').style.display    = '';
  document.getElementById('overlay-create-form').style.display = 'none';

  // Position the overlay-box to exactly cover the calendar panel
  const positionOverlayBox = () => {
    const panel = document.querySelector('.panel-calendar');
    if (!panel) return;
    const r   = panel.getBoundingClientRect();
    const box = document.querySelector('.overlay-box');
    box.style.top    = r.top  + 'px';
    box.style.left   = r.left + 'px';
    box.style.width  = r.width  + 'px';
    box.style.height = r.height + 'px';
  };
  positionOverlayBox();
  if (window._overlayResizeHandler) window.removeEventListener('resize', window._overlayResizeHandler);
  window._overlayResizeHandler = positionOverlayBox;
  window.addEventListener('resize', positionOverlayBox);

  document.getElementById('event-overlay').classList.add('open');
}

// ── GCAL BIDIRECTIONAL SYNC ──────────────────────────────────────────────────

// GCal event ID cache (localStorage) so we can PATCH/DELETE by ID
function getGcalCache() {
  try { return JSON.parse(localStorage.getItem('gcalCache') || '{}'); }
  catch { return {}; }
}
function gcalCacheKey(dateStr, title) { return `${dateStr}|||${title}`; }
function cacheGcalEvent(dateStr, title, calendarId, eventId) {
  const c = getGcalCache();
  c[gcalCacheKey(dateStr, title)] = { calendarId, eventId };
  localStorage.setItem('gcalCache', JSON.stringify(c));
}
function lookupGcalEvent(dateStr, title) {
  return getGcalCache()[gcalCacheKey(dateStr, title)] || null;
}

// Retry queue for failed GCal writes
function getRetryQueue() {
  try { return JSON.parse(localStorage.getItem('gcalRetryQueue') || '[]'); }
  catch { return []; }
}
function queueRetry(op) {
  const q = getRetryQueue();
  q.push(op);
  localStorage.setItem('gcalRetryQueue', JSON.stringify(q));
}
async function processRetryQueue() {
  if (!gcalToken) return;
  const q = getRetryQueue();
  if (!q.length) return;
  const remaining = [];
  for (const op of q) {
    try {
      const ok = await executeQueuedOp(op);
      if (!ok) remaining.push(op);
    } catch { remaining.push(op); }
  }
  localStorage.setItem('gcalRetryQueue', JSON.stringify(remaining));
}
async function executeQueuedOp(op) {
  if (op.type === 'delete') {
    const r = await gcalReq('DELETE', op.calendarId, op.eventId);
    return r.status === 204 || r.status === 200 || r.status === 404;
  }
  if (op.type === 'patch') {
    const r = await gcalReq('PATCH', op.calendarId, op.eventId, op.body);
    return r.ok;
  }
  if (op.type === 'create') {
    const r = await gcalReq('POST', op.calendarId, null, op.body);
    if (r.ok) { const ev = await r.json(); cacheGcalEvent(op.dateStr, op.body.summary, op.calendarId, ev.id); return true; }
  }
  return false;
}

// Core GCal fetch wrapper with automatic silent token refresh on 401
async function gcalReq(method, calendarId, eventId, body) {
  if (!gcalToken) throw new Error('auth_required');
  const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events` +
    (eventId ? `/${eventId}` : '');
  const makeOpts = () => ({
    method,
    headers: { 'Authorization': `Bearer ${gcalToken}`, ...(body ? { 'Content-Type': 'application/json' } : {}) },
    ...(body ? { body: JSON.stringify(body) } : {})
  });
  let resp = await fetch(url, makeOpts());
  if (resp.status === 401) {
    gcalToken = null;
    document.getElementById('gcal-badge').textContent = '● reconnecting…';
    document.getElementById('gcal-badge').classList.remove('authed');
    if (window._gcalClient) {
      await new Promise(resolve => {
        window._gcalTokenResolve = resolve;
        window._gcalClient.requestAccessToken({ prompt: '' });
        setTimeout(() => { if (window._gcalTokenResolve) { window._gcalTokenResolve(false); delete window._gcalTokenResolve; } }, 5000);
      });
    }
    if (!gcalToken) throw new Error('auth_required');
    resp = await fetch(url, makeOpts());
  }
  return resp;
}

// Search GCal for an event by date + title (checks cache first, then API)
async function findGcalEvent(dateStr, title) {
  const cached = lookupGcalEvent(dateStr, title);
  if (cached) return cached;
  if (!gcalToken) return null;
  const dayStart = `${dateStr}T00:00:00Z`;
  const dayEnd   = `${dateStr}T23:59:59Z`;
  for (const calId of [GCAL_CALENDAR, 'primary']) {
    try {
      const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events` +
        `?timeMin=${encodeURIComponent(dayStart)}&timeMax=${encodeURIComponent(dayEnd)}&singleEvents=true&maxResults=50`;
      const r = await fetch(url, { headers: { 'Authorization': `Bearer ${gcalToken}` } });
      if (!r.ok) continue;
      const { items = [] } = await r.json();
      const match = items.find(e => e.summary === title);
      if (match) {
        cacheGcalEvent(dateStr, title, calId, match.id);
        return { calendarId: calId, eventId: match.id, event: match };
      }
    } catch {}
  }
  return null;
}

// Non-blocking error toast (auto-dismisses after 5s)
let _toastTimer = null;
function showSyncError(msg) {
  let toast = document.getElementById('sync-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'sync-toast';
    toast.style.cssText =
      'position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--red);' +
      'color:var(--red);font-size:11px;letter-spacing:0.05em;padding:10px 16px;z-index:9999;' +
      'max-width:280px;line-height:1.5;animation:fadeIn 0.2s ease;';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.display = 'block';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { toast.style.display = 'none'; }, 5000);
}

function addHourToTime(t) {
  const [h, m] = t.split(':').map(Number);
  return `${String((h + 1) % 24).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// ── ACTION 3 — DELETE WITH CONFIRMATION ──────────────────────────────────────
let _deleteConfirmKey = null;

function showDeleteConfirm(dateStr, title, btn) {
  const key = `${dateStr}|||${title}`;
  if (_deleteConfirmKey === key) {
    // Second click — execute
    _deleteConfirmKey = null;
    btn.disabled = true;
    deleteEvent(dateStr, title);
  } else {
    // First click — arm confirmation
    _deleteConfirmKey = key;
    btn.textContent   = 'sure?';
    btn.style.borderColor = 'var(--red)';
    btn.style.color       = 'var(--red)';
    setTimeout(() => {
      if (_deleteConfirmKey === key) {
        _deleteConfirmKey = null;
        btn.textContent = '✕';
        btn.style.borderColor = '';
        btn.style.color       = '';
      }
    }, 3000);
  }
}

async function deleteEvent(dateStr, title) {
  // Optimistic local removal
  const evStore = data.events || data.agenda || [];
  const idx = evStore.findIndex(e => e.title === title && e._date && e._date.slice(0,10) === dateStr);
  if (idx !== -1) evStore.splice(idx, 1);
  const removed = getRemovedEvents();
  removed.add(`${dateStr}|||${title}`);
  localStorage.setItem('removedEvents', JSON.stringify([...removed]));
  renderCalendar();
  openOverlay(overlayDate);

  // GCal DELETE
  try {
    if (!gcalToken) throw new Error('auth_required');
    const found = await findGcalEvent(dateStr, title);
    if (!found) {
      showSyncError('Sync failed — event removed locally. Not found in GCal.');
      return;
    }
    const resp = await gcalReq('DELETE', found.calendarId, found.eventId);
    if (!resp.ok && resp.status !== 404) throw new Error(`HTTP ${resp.status}`);
    // Remove from cache
    const c = getGcalCache();
    delete c[gcalCacheKey(dateStr, title)];
    localStorage.setItem('gcalCache', JSON.stringify(c));
  } catch (e) {
    if (e.message === 'auth_required') {
      showSyncError('Sync failed — not connected to GCal. Event removed locally only.');
    } else {
      queueRetry({ type: 'delete', calendarId: GCAL_CALENDAR, eventId: null, dateStr, title });
      showSyncError('Sync failed — changes saved locally. Will retry on next load.');
    }
  }

  // Also remove from Apple Calendar bridge
  try { await calServerDelete('/events', { title, date: dateStr }); } catch {}
}

// ── ACTION 4 — DEP RESOLVED → PATCH PARENT GCAL EVENT ────────────────────────
async function updateParentGcalEvent(dep) {
  if (!gcalToken || !dep.parentTitle || dep.parentType === 'workflow') return;
  try {
    const past   = new Date(Date.now() - 30  * 86400000).toISOString();
    const future = new Date(Date.now() + 180 * 86400000).toISOString();
    const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(GCAL_CALENDAR)}/events` +
      `?timeMin=${encodeURIComponent(past)}&timeMax=${encodeURIComponent(future)}&singleEvents=true&maxResults=200`;
    const r = await fetch(url, { headers: { 'Authorization': `Bearer ${gcalToken}` } });
    if (!r.ok) return;
    const { items = [] } = await r.json();
    const parentEv = items.find(e => e.summary === dep.parentTitle);
    if (!parentEv) return;
    const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    const note  = `[Dependency resolved: ${dep.title} — ${today}]`;
    const desc  = parentEv.description ? `${parentEv.description}\n${note}` : note;
    await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(GCAL_CALENDAR)}/events/${parentEv.id}`,
      {
        method: 'PATCH',
        headers: { 'Authorization': `Bearer ${gcalToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ description: desc })
      }
    );
  } catch (e) { console.warn('updateParentGcalEvent:', e.message); }
}

document.getElementById('event-overlay').addEventListener('click', e => {

async function saveEvent() {
  const title    = document.getElementById('ev-title').value.trim();
  const startStr = document.getElementById('ev-start').value;
  const endStr   = document.getElementById('ev-end').value;
  const tag      = document.getElementById('ev-tag').value;
  const status   = document.getElementById('overlay-status');

  if (!title) { status.textContent = 'add a title first'; status.className = 'overlay-status err'; return; }
  if (!gcalToken) {
    status.textContent = 'connecting to GCal…';
    status.className   = 'overlay-status';
    if (window._gcalClient) window._gcalClient.requestAccessToken({ prompt: 'consent' });
    return;
  }

  const calId = tag === 'personal' ? 'primary' : GCAL_CALENDAR;

  // ── ACTION 2 — UPDATE existing event ────────────────────────────────────────
  if (_editMode && _editEventData) {
    const { dateStr, title: oldTitle } = _editEventData;
    const [yr, mo, dy] = dateStr.split('-');
    status.textContent = 'updating…'; status.className = 'overlay-status';
    try {
      let found = await findGcalEvent(dateStr, oldTitle);
      if (!found) {
        status.textContent = 'event not found in GCal — cannot update';
        status.className   = 'overlay-status err';
        return;
      }
      const body = {
        summary: title,
        start:   { dateTime: `${dateStr}T${startStr}:00`, timeZone: 'Europe/London' },
        end:     { dateTime: `${dateStr}T${endStr}:00`,   timeZone: 'Europe/London' }
      };
      const resp = await gcalReq('PATCH', found.calendarId, found.eventId, body);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      // Update cache key if title changed
      if (title !== oldTitle) {
        const c = getGcalCache();
        delete c[gcalCacheKey(dateStr, oldTitle)];
        c[gcalCacheKey(dateStr, title)] = { calendarId: found.calendarId, eventId: found.eventId };
        localStorage.setItem('gcalCache', JSON.stringify(c));
      }
      // Update local data
      const evStore = data.events || data.agenda || [];
      const idx = evStore.findIndex(e => e.title === oldTitle && e._date && e._date.slice(0,10) === dateStr);
      if (idx !== -1) { evStore[idx].title = title; evStore[idx].time = startStr; evStore[idx].tag = tag; }
      status.textContent = '✓ updated in GCal'; status.className = 'overlay-status ok';
      renderCalendar();
      setTimeout(() => openOverlay(overlayDate), 1200);
    } catch (e) {
      status.textContent = 'update failed — ' + e.message;
      status.className   = 'overlay-status err';
      if (e.message === 'auth_required') showSyncError('Sync failed — not connected to GCal.');
      else { queueRetry({ type: 'patch', calendarId: calId, eventId: null, body: { summary: title } }); showSyncError('Sync failed — changes saved locally.'); }
    }
    return;
  }

  // ── ACTION 1 — CREATE new event ──────────────────────────────────────────────
  const yr  = overlayDate.getFullYear();
  const mo  = String(overlayDate.getMonth() + 1).padStart(2, '0');
  const day = String(overlayDate.getDate()).padStart(2, '0');
  const dateStr = `${yr}-${mo}-${day}`;

  const eventBody = {
    summary: title,
    start:   { dateTime: `${dateStr}T${startStr}:00`, timeZone: 'Europe/London' },
    end:     { dateTime: `${dateStr}T${endStr}:00`,   timeZone: 'Europe/London' },
    colorId: tag === 'deadline' ? '11' : tag === 'personal' ? '7' : '1'
  };

  status.textContent = 'saving…'; status.className = 'overlay-status';

  try {
    const resp = await gcalReq('POST', calId, null, eventBody);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const created = await resp.json();

    // Cache the GCal event ID so edit/delete can find it instantly
    cacheGcalEvent(dateStr, title, calId, created.id);

    status.textContent = '✓ saved to GCal'; status.className = 'overlay-status ok';

    // Apple Calendar bridge for personal/skate tags
    const calMap = { skate: 'Skate Haven Calendar', personal: 'Home' };
    const appleCalName = calMap[tag];
    if (appleCalName) {
      try {
        await calServerPost('/events', { title, start: `${dateStr}T${startStr}:00`, end: `${dateStr}T${endStr}:00`, calendar: appleCalName, tag });
        status.textContent = `✓ saved to GCal + ${appleCalName}`;
      } catch { status.textContent = '✓ saved to GCal (Apple bridge offline)'; }
    }

    // Add to local events immediately
    if (!data.events) data.events = [];
    data.events.push({ time: startStr, title, meta: '', tag, calendar: appleCalName || '', _date: `${dateStr}T${startStr}:00`, _gcalId: created.id });
    renderCalendar();
    setTimeout(() => openOverlay(overlayDate), 1200);
  } catch (e) {
    status.textContent = 'failed: ' + e.message;
    status.className   = 'overlay-status err';
    if (e.message === 'auth_required') {
      gcalToken = null;
      document.getElementById('gcal-badge').textContent = '● not connected to GCal';
      document.getElementById('gcal-badge').classList.remove('authed');
    }
    queueRetry({ type: 'create', calendarId: calId, dateStr, body: eventBody });
    showSyncError('Sync failed — changes saved locally. Will retry on next load.');
  }
}

// ── CAL HOVER TOOLTIP ────────────────────────────────────────────────────────
function buildCalTooltip(dayEvts, dayDeps) {
  let html = '';
  if (dayEvts.length) {
    html += dayEvts.slice(0, 5).map(ev => {
      const col = getEventCalColor(ev);
      return `<div class="tip-row">
        <span class="tip-dot" style="background:${col}"></span>
        <span class="tip-time">${ev.time}</span>
        <span class="tip-label">${ev.title}</span>
      </div>`;
    }).join('');
  }
  if (dayDeps.length) {
    if (dayEvts.length) html += '<div class="tip-divider"></div>';
    html += dayDeps.slice(0, 5).map(dep => {
      const col = getDepColor(dep);
      const dateLabel = dep.resolveBy ? formatDepDate(dep.resolveBy) : '—';
      return `<div class="tip-row">
        <span class="tip-dep" style="border:1.5px solid ${col}"></span>
        <span class="tip-label">${dep.title}</span>
        <span class="tip-sub">${dateLabel}</span>
      </div>`;
    }).join('');
  }
  return html;
}

function showCalTooltip(e, html) {
  const tip = document.getElementById('cal-tooltip');
  if (!tip || !html) return;
  tip.innerHTML = html;
  tip.classList.add('visible');
  moveCalTooltip(e);
}

function moveCalTooltip(e) {
  const tip = document.getElementById('cal-tooltip');
  if (!tip || !tip.classList.contains('visible')) return;
  const x = e.clientX + 14;
  const y = e.clientY - 10;
  tip.style.left = Math.min(x, window.innerWidth  - tip.offsetWidth  - 8) + 'px';
  tip.style.top  = Math.min(y, window.innerHeight - tip.offsetHeight - 8) + 'px';
}

function hideCalTooltip() {
  const tip = document.getElementById('cal-tooltip');
  if (tip) tip.classList.remove('visible');
}

// Update last sync time display
function updateSyncTime() {
  document.getElementById('last-sync').textContent = 'last sync: ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

<!-- ── EVENT CREATE OVERLAY ── -->
<div id="event-overlay">
  <div class="overlay-box">

    <!-- ── Day View (shown on first click) ── -->
    <div id="overlay-day-view">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div>
          <div class="overlay-title" id="overlay-day-label" style="margin-bottom:0"></div>
        </div>
        <button onclick="closeOverlay()" title="Close"
          style="width:26px;height:26px;padding:0;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text2);cursor:pointer;font-size:13px;flex-shrink:0;"
          onmouseover="this.style.borderColor='var(--text2)'"
          onmouseout="this.style.borderColor='var(--border)'">✕</button>
      </div>
      <div id="overlay-events-list" style="min-height:40px;max-height:220px;overflow-y:auto;margin-bottom:12px;"></div>
      <div class="overlay-actions">
        <button class="overlay-btn primary" style="width:100%" onclick="showCreateForm()">＋ New Event</button>
      </div>
    </div>

    <!-- ── Create Form (shown after clicking + New Event) ── -->
    <div id="overlay-create-form" style="display:none">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <button class="overlay-btn cancel" onclick="showDayView()" style="padding:2px 8px;font-size:11px;">← back</button>
        <div>
          <div class="overlay-title" style="margin-bottom:0">New Event</div>
          <div class="overlay-date-label" id="overlay-date-label"></div>
        </div>
      </div>
      <input class="overlay-input" id="ev-title" type="text" placeholder="Event title" autocomplete="off" />
      <div class="overlay-row">
        <input class="overlay-input" id="ev-start" type="time" value="09:00" />
        <input class="overlay-input" id="ev-end"   type="time" value="10:00" />
      </div>
      <select class="overlay-select" id="ev-tag">
        <option value="work">work</option>
        <option value="personal">personal</option>
        <option value="skate">skate haven</option>
        <option value="deadline">deadline</option>
      </select>
      <div class="overlay-status" id="overlay-status"></div>
      <div class="overlay-actions">
        <button class="overlay-btn cancel" onclick="closeOverlay()">cancel</button>
        <button class="overlay-btn primary" id="overlay-save-btn" onclick="saveEvent()">save to GCal</button>
      </div>
      <div id="gcal-badge">● not connected to GCal</div>
    </div>

  </div>
</div>

<div id="cal-tooltip"></div>
</body>
</html>
